<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>NSG Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0f1e;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      padding: 30px;
    }

    h1 {
      color: #00e5ff;
      letter-spacing: 2px;
      margin-bottom: 24px;
      font-size: 20px;
    }

    .section {
      background: #111827;
      border: 1px solid #1f2d40;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .section h2 {
      color: #94a3b8;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 12px;
    }

    label {
      color: #94a3b8;
      font-size: 13px;
      min-width: 80px;
    }

    input, select {
      background: #1a2535;
      border: 1px solid #1f2d40;
      color: #e0e0e0;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      width: 140px;
    }

    button {
      background: #1a2535;
      border: 1px solid #00e5ff;
      color: #00e5ff;
      padding: 8px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    button:hover {
      background: #00e5ff;
      color: #0a0f1e;
      font-weight: bold;
    }

    button.danger {
      border-color: #f87171;
      color: #f87171;
    }

    button.danger:hover {
      background: #f87171;
      color: #0a0f1e;
    }

    button.success {
      border-color: #4ade80;
      color: #4ade80;
    }

    button.success:hover {
      background: #4ade80;
      color: #0a0f1e;
    }

    /* ── SOLDIER PANELS ── */
    #soldiers-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .soldier-panel {
      background: #0f1c2e;
      border: 1px solid #1f2d40;
      border-radius: 10px;
      padding: 16px;
    }

    .soldier-panel.auto-running {
      border-color: #4ade80;
      box-shadow: 0 0 8px #4ade8044;
    }

    .soldier-panel .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .soldier-panel .panel-name {
      font-weight: bold;
      font-size: 14px;
    }

    .soldier-panel .panel-team {
      font-size: 11px;
      color: #94a3b8;
    }

    .soldier-panel .panel-status {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 12px;
      background: #1a2535;
      color: #4ade80;
    }

    .soldier-panel .panel-status.auto {
      background: #1a3a1a;
      color: #4ade80;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .panel-controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .panel-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .panel-row label {
      font-size: 12px;
      color: #64748b;
      min-width: 50px;
    }

    .floor-mini-btns {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .floor-mini-btn {
      padding: 4px 8px;
      font-size: 11px;
      border-radius: 4px;
      min-width: 32px;
      text-align: center;
    }

    .floor-mini-btn.active {
      background: #00e5ff;
      color: #0a0f1e;
      font-weight: bold;
    }

    .panel-input {
      width: 70px;
      padding: 5px 8px;
      font-size: 12px;
    }

    .panel-actions {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .panel-actions button {
      flex: 1;
      padding: 6px;
      font-size: 11px;
    }

    .soldier-location-info {
      font-size: 11px;
      color: #4ade80;
      margin-top: 8px;
      padding: 6px;
      background: #0a0f1e;
      border-radius: 4px;
      font-family: monospace;
    }

    /* ── GLOBAL CONTROLS ── */
    .global-btns {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* ── LOG ── */
    #log {
      background: #0a0f1e;
      border: 1px solid #1f2d40;
      border-radius: 6px;
      padding: 12px;
      font-size: 12px;
      color: #4ade80;
      height: 150px;
      overflow-y: auto;
      font-family: monospace;
    }

    /* ── COMMANDER MESSAGES ── */
    #commander-messages {
      background: #0a0f1e;
      border: 1px solid #1f2d40;
      border-radius: 6px;
      padding: 12px;
      font-size: 12px;
      color: #00e5ff;
      height: 120px;
      overflow-y: auto;
      font-family: monospace;
    }
  </style>
</head>
<body>

  <h1>🎮 NSG Multi-Soldier Simulator</h1>

  <!-- GLOBAL CONTROLS -->
  <div class="section">
    <h2>Global Controls</h2>
    <div class="global-btns">
      <button id="start-all-btn" class="success">▶ Start All Auto Move</button>
      <button id="stop-all-btn" class="danger">■ Stop All</button>
      <button id="refresh-btn">🔄 Refresh Soldiers</button>
    </div>
  </div>

  <!-- SOLDIER PANELS -->
  <div class="section">
    <h2>Individual Soldier Controls</h2>
    <div id="soldiers-container">
      <p style="color:#64748b;font-size:13px;">Loading soldiers...</p>
    </div>
  </div>

  <!-- LOG -->
  <div class="section">
    <h2>Event Log</h2>
    <div id="log">Waiting for events...<br/></div>
  </div>

  <!-- COMMANDER MESSAGES -->
  <div class="section">
    <h2>📡 Messages from Commander</h2>
    <div id="commander-messages">Waiting for commander messages...<br/></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.2/sockjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

<script>
  const BUILDING_ID = 1;
  const FLOORS = [-2, -1, 0, 1, 2, 3, 4, 5];
  const FLOOR_LABELS = { '-2':'B2', '-1':'B1', '0':'GF', '1':'F1', '2':'F2', '3':'F3', '4':'F4', '5':'F5' };

  // State per soldier
  const soldierState = {};   // soldierId -> { floor, x, z, autoInterval }
  let allSoldiers = [];

  // ── Log ──
  function log(msg) {
    const d = document.getElementById('log');
    const t = new Date().toLocaleTimeString();
    d.innerHTML += '[' + t + '] ' + msg + '<br/>';
    d.scrollTop = d.scrollHeight;
  }

  // ── Send location update ──
  function sendUpdate(soldier) {
    const state = soldierState[soldier.id];
    const payload = {
      soldierId: soldier.id,
      buildingId: BUILDING_ID,
      x: state.x,
      y: 0,
      z: state.z,
      floorNumber: state.floor
    };

    fetch('/api/location/update', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(function(res) { return res.json(); })
    .then(function() {
      const info = document.getElementById('loc-' + soldier.id);
      if (info) {
        info.textContent = 'Floor: ' + FLOOR_LABELS[state.floor] +
          ' | X: ' + state.x.toFixed(1) + ' | Z: ' + state.z.toFixed(1);
      }
      log('✅ ' + soldier.name + ' → ' + FLOOR_LABELS[state.floor] +
          ' X:' + state.x.toFixed(1) + ' Z:' + state.z.toFixed(1));
    })
    .catch(function() { log('❌ Failed: ' + soldier.name); });
  }

  // ── Auto move one soldier ──
  function startAuto(soldier) {
    stopAuto(soldier); // clear existing

    const panel = document.getElementById('panel-' + soldier.id);
    const statusEl = document.getElementById('status-' + soldier.id);
    if (panel) panel.classList.add('auto-running');
    if (statusEl) { statusEl.textContent = '🟢 AUTO'; statusEl.className = 'panel-status auto'; }

    soldierState[soldier.id].autoInterval = setInterval(function() {
      const state = soldierState[soldier.id];
      // Random walk — move slightly from current position
      state.x = Math.max(-18, Math.min(18, state.x + (Math.random() * 6 - 3)));
      state.z = Math.max(-13, Math.min(13, state.z + (Math.random() * 4 - 2)));
      // Occasionally change floor
      if (Math.random() < 0.2) {
        state.floor = FLOORS[Math.floor(Math.random() * FLOORS.length)];
        updateFloorButtons(soldier.id, state.floor);
      }
      sendUpdate(soldier);
    }, 2000);
  }

  function stopAuto(soldier) {
    const state = soldierState[soldier.id];
    if (state && state.autoInterval) {
      clearInterval(state.autoInterval);
      state.autoInterval = null;
    }
    const panel = document.getElementById('panel-' + soldier.id);
    const statusEl = document.getElementById('status-' + soldier.id);
    if (panel) panel.classList.remove('auto-running');
    if (statusEl) { statusEl.textContent = 'MANUAL'; statusEl.className = 'panel-status'; }
  }

  // ── Update floor button highlight ──
  function updateFloorButtons(soldierId, floor) {
    document.querySelectorAll('.fmb-' + soldierId).forEach(function(btn) {
      btn.classList.toggle('active', parseInt(btn.getAttribute('data-floor')) === floor);
    });
  }

  // ── Build soldier panel ──
  function buildPanel(soldier) {
    soldierState[soldier.id] = { floor: 0, x: 0, z: 0, autoInterval: null };

    const div = document.createElement('div');
    div.className = 'soldier-panel';
    div.id = 'panel-' + soldier.id;

    // Color dot
    const colors = ['#ff4444','#44ff88','#ffaa00','#00aaff','#ff00ff','#ffffff'];
    const color = colors[soldier.id % colors.length];

    div.innerHTML =
      '<div class="panel-header">' +
        '<div>' +
          '<div class="panel-name" style="color:' + color + '">● ' + soldier.name + '</div>' +
          '<div class="panel-team">' + soldier.hitTeam + ' · ' + soldier.status + '</div>' +
        '</div>' +
        '<div class="panel-status" id="status-' + soldier.id + '">MANUAL</div>' +
      '</div>' +

      '<div class="panel-controls">' +

        // Floor selector
        '<div class="panel-row">' +
          '<label>Floor</label>' +
          '<div class="floor-mini-btns" id="floor-btns-' + soldier.id + '">' +
            FLOORS.map(function(f) {
              return '<button class="floor-mini-btn fmb-' + soldier.id +
                (f === 0 ? ' active' : '') +
                '" data-floor="' + f + '" data-sid="' + soldier.id + '">' +
                FLOOR_LABELS[f] + '</button>';
            }).join('') +
          '</div>' +
        '</div>' +

        // X position
        '<div class="panel-row">' +
          '<label>X</label>' +
          '<input type="number" class="panel-input" id="x-' + soldier.id +
            '" value="0" min="-18" max="18" step="1"/>' +
          '<label>Z</label>' +
          '<input type="number" class="panel-input" id="z-' + soldier.id +
            '" value="0" min="-13" max="13" step="1"/>' +
        '</div>' +

        // Actions
        '<div class="panel-actions">' +
          '<button data-sid="' + soldier.id + '" class="send-btn">📡 Send</button>' +
          '<button data-sid="' + soldier.id + '" class="auto-btn success">▶ Auto</button>' +
          '<button data-sid="' + soldier.id + '" class="stop-btn danger">■ Stop</button>' +
        '</div>' +

        // Location info
        '<div class="soldier-location-info" id="loc-' + soldier.id + '">No update yet</div>' +

      '</div>';

    return div;
  }

  // ── Attach panel events ──
  function attachPanelEvents(soldier) {
    // Floor buttons
    document.querySelectorAll('.fmb-' + soldier.id).forEach(function(btn) {
      btn.addEventListener('click', function() {
        soldierState[soldier.id].floor = parseInt(btn.getAttribute('data-floor'));
        updateFloorButtons(soldier.id, soldierState[soldier.id].floor);
      });
    });

    // Send button
    document.querySelector('[data-sid="' + soldier.id + '"].send-btn')
      .addEventListener('click', function() {
        soldierState[soldier.id].x = parseFloat(document.getElementById('x-' + soldier.id).value);
        soldierState[soldier.id].z = parseFloat(document.getElementById('z-' + soldier.id).value);
        sendUpdate(soldier);
      });

    // Auto button
    document.querySelector('[data-sid="' + soldier.id + '"].auto-btn')
      .addEventListener('click', function() { startAuto(soldier); });

    // Stop button
    document.querySelector('[data-sid="' + soldier.id + '"].stop-btn')
      .addEventListener('click', function() { stopAuto(soldier); });
  }

  // ── Load soldiers ──
  function loadSoldiers() {
    fetch('/api/soldiers')
      .then(function(res) { return res.json(); })
      .then(function(soldiers) {
        allSoldiers = soldiers;
        const container = document.getElementById('soldiers-container');
        container.innerHTML = '';

        if (soldiers.length === 0) {
          container.innerHTML = '<p style="color:#f87171;font-size:13px;">No soldiers found. Add via Postman first.</p>';
          return;
        }

        soldiers.forEach(function(soldier) {
          const panel = buildPanel(soldier);
          container.appendChild(panel);
          attachPanelEvents(soldier);
        });

        log('Loaded ' + soldiers.length + ' soldiers');
      })
      .catch(function() { log('❌ Failed to load soldiers'); });
  }

  // ── Global controls ──
  document.getElementById('start-all-btn').addEventListener('click', function() {
    allSoldiers.forEach(function(s) { startAuto(s); });
    log('▶ Started auto move for all soldiers');
  });

  document.getElementById('stop-all-btn').addEventListener('click', function() {
    allSoldiers.forEach(function(s) { stopAuto(s); });
    log('■ Stopped all soldiers');
  });

  document.getElementById('refresh-btn').addEventListener('click', function() {
    loadSoldiers();
  });

  // ── WebSocket for commander messages ──
  const msgSocket = new SockJS('/ws');
  const msgStomp = Stomp.over(msgSocket);
  msgStomp.debug = null;

  msgStomp.connect({}, function() {
    log('📡 Connected to command channel');

    fetch('/api/soldiers')
      .then(function(res) { return res.json(); })
      .then(function(soldiers) {
        soldiers.forEach(function(s) {
          msgStomp.subscribe('/topic/messages/' + s.id, function(message) {
            const alert = JSON.parse(message.body);
            const msgDiv = document.getElementById('commander-messages');
            const time = new Date().toLocaleTimeString();
            msgDiv.innerHTML +=
              '[' + time + '] 🎖️ Commander → <strong>' + alert.soldier.name +
              '</strong>: <span style="color:#4ade80">' +
              alert.commanderMessage + '</span><br/>';
            msgDiv.scrollTop = msgDiv.scrollHeight;
            log('🎖️ Commander says to ' + alert.soldier.name + ': ' + alert.commanderMessage);
          });
        });
      });
  });

  // ── Init ──
  loadSoldiers();
</script>

</body>
</html>
